<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: 'Courier New', monospace; display: flex; justify-content: center; padding: 40px; background-color: #e0e0e0; }
        .card { width: 320px; border: 3px solid #000; padding: 25px; background: #fff; box-shadow: 10px 10px 0px #000; }
        img { width: 120px; height: 120px; border: 2px solid #000; object-fit: cover; filter: grayscale(20%); }
        .label { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 5px; display: block; }
        .content { border-bottom: 2px solid #000; margin: 15px 0; padding-bottom: 5px; font-size: 16px; font-weight: bold; }
        .bit-info { font-size: 13px; line-height: 1.4; border: 1px dashed #000; padding: 10px; background: #fafafa; }
    </style>
</head>
<body>
    <div class="card">
        <img src="IMG20260217105250.jpg" alt="Keisha">
        <span class="label">Profile Picture</span>

        <div class="content"><span class="label">Name</span> Keisha Lyle Olivar</div>
        <div class="content"><span class="label">Course & Section</span> BSCS - 1A</div>
        
        <span class="label">Bit Info</span>
        <div class="bit-info">
            <strong>Goal:</strong> To build amazing software.<br>
            <strong>Skills:</strong> HTML, CSS, Logic Formulation.<br>
            <strong>Status:</strong> Currently debugging life.
        </div>
    </div>
</body>
</html>
